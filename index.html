<html lang="fr">
<head>

<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Trip&Me"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="description" content="Trip&Me — Planifiez votre voyage parfait. Découvrez combien de fois vous avez fait le tour du monde."/>
<meta name="keywords" content="voyage, trip planner, travel, itinéraire, vacances, tour du monde"/>
<meta property="og:title" content="Trip&Me — The World is Mine"/>

<style>
/* ═══════════════════════════════
   VARIABLES & RESET
═══════════════════════════════ */
:root{
  --sky:#0EA5E9; --ocean:#0369A1; --coral:#F97316; --sun:#FBBF24;
  --mint:#10B981; --rose:#F43F5E; --violet:#8B5CF6;
  --night:#0C1A2E; --night2:#0F2340; --night3:#162844;
  --text:#F8FAFC; --muted:#94A3B8; --muted2:#64748B;
  --card:rgba(255,255,255,0.06); --card2:rgba(255,255,255,0.10);
  --brd:rgba(255,255,255,0.10); --brd2:rgba(255,255,255,0.18);
  --r:16px; --r2:24px;
  --shadow-coral:0 8px 32px rgba(249,115,22,0.4);
  --shadow-sky:0 8px 32px rgba(14,165,233,0.4);
  --shadow-sun:0 8px 32px rgba(251,191,36,0.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{
  font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
  background:var(--night);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--sky);border-radius:2px;}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;}
img{max-width:100%;height:auto;}

/* ═══════════════════════════════
   COOKIE RGPD
═══════════════════════════════ */
#cookie-banner{
  position:fixed;bottom:0;left:0;right:0;z-index:9000;
  background:rgba(9,35,65,0.98);
  border-top:2px solid var(--sky);
  padding:1.25rem 2rem;
  display:flex;align-items:center;justify-content:space-between;
  gap:1.5rem;flex-wrap:wrap;
  -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
  transform:translateY(0);transition:transform .4s ease;
}
#cookie-banner.hidden{transform:translateY(110%)!important;}
#cookie-banner p{font-size:13px;color:#CBD5E1;max-width:680px;line-height:1.7;}
#cookie-banner a{color:var(--sun);text-decoration:underline;cursor:pointer;}
.ck-btns{display:flex;gap:10px;flex-shrink:0;}
.ck-btn{
  padding:9px 22px;border-radius:50px;font-size:13px;font-weight:600;
  cursor:pointer;border:none;transition:all .2s;
}
.ck-btn.ok{background:linear-gradient(135deg,var(--sky),var(--mint));color:#fff;}
.ck-btn.ok:hover{transform:translateY(-1px);box-shadow:var(--shadow-sky);}
.ck-btn.no{background:transparent;color:var(--muted);border:1px solid var(--brd);}

/* ═══════════════════════════════
   HEADER
═══════════════════════════════ */
header{
  position:fixed;top:0;left:0;right:0;z-index:500;
  padding:1rem 2rem;
  display:flex;align-items:center;justify-content:space-between;
  gap:1rem;
  background:linear-gradient(to bottom,rgba(12,26,46,0.97) 0%,rgba(12,26,46,0) 100%);
}
.logo{
  font-family:'Playfair Display',serif;font-weight:900;font-size:1.7rem;
  background:linear-gradient(135deg,var(--sun),var(--coral));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;white-space:nowrap;flex-shrink:0;
}
nav{display:flex;align-items:center;gap:1.5rem;}
nav a{
  color:rgba(248,250,252,0.7);font-size:14px;font-weight:500;
  cursor:pointer;transition:color .2s;white-space:nowrap;
}
nav a:hover{color:var(--text);}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
#lang-sel{
  background:rgba(255,255,255,0.08);border:1px solid var(--brd);
  color:var(--text);padding:7px 10px;border-radius:10px;
  font-size:13px;cursor:pointer;outline:none;
}
#lang-sel option{background:var(--night2);}
.btn-hdr-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
.btn-hdr{
  padding:9px 20px;
  background:linear-gradient(135deg,var(--sky),var(--ocean));
  color:#fff;border:none;border-radius:50px;
  font-size:14px;font-weight:700;white-space:nowrap;
  transition:all .2s;box-shadow:var(--shadow-sky);
}
.btn-hdr:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(14,165,233,.5);}
.btn-hdr-sub{font-size:10px;color:var(--muted);font-weight:400;}

/* ═══════════════════════════════
   HERO
═══════════════════════════════ */
#hero{
  height:100vh;min-height:600px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
#globe-canvas{
  position:absolute;inset:0;width:100%;height:100%;display:block;
}
/* Overlay gradient pour lisibilité du texte */
#hero::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 60% at 50% 50%, rgba(12,26,46,0.0) 0%, rgba(12,26,46,0.75) 100%),
    linear-gradient(to bottom, rgba(12,26,46,0.5) 0%, rgba(12,26,46,0) 30%, rgba(12,26,46,0) 60%, rgba(12,26,46,0.8) 100%);
  pointer-events:none;z-index:1;
}
.hero-content{
  position:relative;z-index:2;
  text-align:center;padding:0 1.5rem;
  max-width:860px;width:100%;
}

/* Accroche animée */
.hero-hook{
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,rgba(251,191,36,0.20),rgba(249,115,22,0.20));
  border:1.5px solid rgba(251,191,36,0.50);
  border-radius:50px;padding:12px 26px;
  font-size:15px;font-weight:700;color:var(--sun);
  margin-bottom:1.5rem;letter-spacing:0.01em;
  opacity:0;animation:zoomIn .7s .2s cubic-bezier(.175,.885,.32,1.275) forwards;
  text-shadow:0 2px 8px rgba(0,0,0,0.5);
}
.plane-spin{display:inline-block;animation:spinPlane 4s linear infinite;font-size:1.1em;}

h1{
  font-family:'Playfair Display',serif;font-weight:900;
  font-size:clamp(2.6rem,7vw,6rem);line-height:1.05;
  letter-spacing:-0.02em;
  opacity:0;animation:slideUp .8s .45s ease forwards;
  text-shadow:0 4px 20px rgba(0,0,0,0.6);
}
.g1{background:linear-gradient(135deg,var(--sun) 0%,var(--coral) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.g2{background:linear-gradient(135deg,#38BDF8 0%,var(--mint) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* Phrase sous le titre — LISIBLE avec fond */
#hero-question{
  margin-top:1.25rem;
  font-size:clamp(1rem,2.5vw,1.2rem);
  color:#ffffff;font-weight:500;line-height:1.6;
  background:rgba(12,26,46,0.55);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:14px;padding:12px 20px;
  display:inline-block;
  opacity:0;animation:slideUp .8s .65s ease forwards;
}
#hero-question strong{color:var(--sun);font-weight:800;}

.hero-pills{
  margin-top:1rem;display:flex;flex-wrap:wrap;
  justify-content:center;gap:8px;
  opacity:0;animation:slideUp .6s .82s ease forwards;
}
.pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(14,165,233,0.18);
  border:1px solid rgba(14,165,233,0.35);
  border-radius:50px;padding:7px 16px;
  font-size:13px;font-weight:600;color:#7DD3FC;
}

/* ═══ CTA ANIMÉS ═══ */
.hero-cta{
  margin-top:1.75rem;
  display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;
  opacity:0;animation:slideUp .8s 1.0s ease forwards;
}

/* Bouton 1 : pulsant, premium */
.cta-card{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:linear-gradient(135deg,rgba(249,115,22,0.15),rgba(225,29,72,0.15));
  border:2px solid rgba(249,115,22,0.5);
  border-radius:18px;padding:14px 28px;
  transition:all .3s;position:relative;overflow:hidden;
  min-width:220px;
  animation:borderPulse 3s ease-in-out infinite;
}
.cta-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--coral),#E11D48);
  opacity:0;transition:opacity .3s;
}
.cta-card:hover::before{opacity:0.08;}
.cta-card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(249,115,22,0.4);border-color:var(--coral);}
.cta-card-main{
  font-size:15px;font-weight:800;color:#fff;
  position:relative;z-index:1;letter-spacing:0.01em;
}
.cta-card-sub{
  font-size:11px;color:rgba(255,220,170,0.9);
  position:relative;z-index:1;font-weight:500;line-height:1.3;
  text-align:center;max-width:200px;
}

/* Bouton 2 : sky */
.cta-card.sky{
  background:linear-gradient(135deg,rgba(14,165,233,0.15),rgba(16,185,129,0.15));
  border:2px solid rgba(14,165,233,0.4);
  animation:borderPulseBlue 3s ease-in-out 1.5s infinite;
}
.cta-card.sky:hover{box-shadow:0 16px 48px rgba(14,165,233,0.4);border-color:var(--sky);}

.scroll-cue{
  position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);
  z-index:2;display:flex;flex-direction:column;align-items:center;gap:5px;
  opacity:0;animation:fadeIn 1s 1.5s ease forwards;
}
.scroll-cue p{font-size:11px;color:rgba(148,163,184,0.8);letter-spacing:3px;text-transform:uppercase;}
.dot-bounce{width:6px;height:6px;border-radius:50%;background:var(--sky);animation:bounce 2s infinite;}

/* ═══════════════════════════════
   STATS BAND
═══════════════════════════════ */
#stats-band{
  padding:3rem 2rem;
  background:linear-gradient(135deg,rgba(14,165,233,0.10),rgba(16,185,129,0.06));
  border-top:1px solid rgba(14,165,233,0.18);
  border-bottom:1px solid rgba(14,165,233,0.18);
}
.stats-grid{
  max-width:960px;margin:0 auto;
  display:grid;grid-template-columns:repeat(4,1fr);gap:2rem;text-align:center;
}
.sg-num{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:900;line-height:1;}
.c1{background:linear-gradient(135deg,var(--sun),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.c2{background:linear-gradient(135deg,var(--sky),var(--mint));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.c3{background:linear-gradient(135deg,var(--coral),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.c4{background:linear-gradient(135deg,var(--mint),var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sg-lab{font-size:13px;color:var(--muted);margin-top:6px;font-weight:500;}

/* ═══════════════════════════════
   FEATURES
═══════════════════════════════ */
#features{padding:5rem 2rem;max-width:1100px;margin:0 auto;}
.sec-tag{
  font-size:11px;letter-spacing:4px;text-transform:uppercase;
  color:var(--coral);font-weight:700;text-align:center;margin-bottom:.75rem;
}
.sec-title{
  font-family:'Playfair Display',serif;font-weight:900;
  font-size:clamp(1.8rem,4vw,3rem);text-align:center;
  margin-bottom:3rem;line-height:1.15;
}
.feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;}
.feat-card{
  background:var(--card);border:1px solid var(--brd);
  border-radius:var(--r2);padding:2rem;transition:all .3s;
}
.feat-card:hover{
  border-color:rgba(14,165,233,0.45);
  transform:translateY(-6px);
  box-shadow:0 20px 50px rgba(14,165,233,0.12);
}
.feat-emoji{font-size:2.5rem;margin-bottom:1rem;display:block;}
.feat-card h3{font-family:'Playfair Display',serif;font-weight:700;font-size:1.15rem;margin-bottom:.5rem;}
.feat-card p{font-size:14px;color:var(--muted);line-height:1.7;}

/* ═══════════════════════════════
   PWA INSTALL BANNER
═══════════════════════════════ */
#pwa-banner{
  background:linear-gradient(135deg,rgba(139,92,246,0.15),rgba(14,165,233,0.15));
  border:1px solid rgba(139,92,246,0.35);
  border-radius:var(--r2);margin:0 2rem 2rem;padding:1.5rem 2rem;
  display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;
}
.pwa-icon{font-size:2.5rem;flex-shrink:0;}
.pwa-text h3{font-family:'Playfair Display',serif;font-weight:700;font-size:1.1rem;margin-bottom:4px;}
.pwa-text p{font-size:13px;color:var(--muted);line-height:1.5;}
.pwa-btns{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto;}
.btn-pwa{
  padding:10px 20px;border-radius:50px;font-size:13px;font-weight:600;
  cursor:pointer;border:none;transition:all .2s;
}
.btn-pwa.main{background:linear-gradient(135deg,var(--violet),var(--sky));color:#fff;}
.btn-pwa.sec{background:transparent;border:1px solid var(--brd);color:var(--muted);}

/* ═══════════════════════════════
   FOOTER
═══════════════════════════════ */
footer{
  padding:3rem 2rem 7rem;border-top:1px solid var(--brd);
  display:flex;flex-direction:column;align-items:center;gap:1rem;text-align:center;
}
footer p{font-size:13px;color:var(--muted);}
.foot-links{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;}
.foot-links a{color:var(--muted);font-size:13px;cursor:pointer;transition:color .2s;}
.foot-links a:hover{color:var(--sky);}
.soc-row{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;}
.soc-btn{
  padding:8px 18px;border-radius:50px;font-size:13px;font-weight:600;
  border:1px solid var(--brd);background:transparent;color:var(--text);
  display:inline-flex;align-items:center;gap:6px;transition:all .2s;
}
.soc-btn:hover{background:var(--card2);border-color:var(--brd2);}

/* ═══════════════════════════════
   MODALS
═══════════════════════════════ */
.overlay{
  position:fixed;inset:0;z-index:800;
  background:rgba(5,15,30,0.88);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  padding:1rem;opacity:0;pointer-events:none;transition:opacity .3s;
}
.overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--night2);
  border:1px solid var(--brd2);
  border-radius:var(--r2);
  width:100%;max-width:660px;
  max-height:90vh;overflow-y:auto;
  padding:2rem;
  transform:translateY(24px) scale(0.97);transition:transform .3s;
}
.overlay.open .modal{transform:translateY(0) scale(1);}
.modal-lg{max-width:780px;}
.mhdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.75rem;}
.mtitle{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:900;line-height:1.2;}
.mtitle em{
  font-style:normal;
  background:linear-gradient(135deg,var(--sun),var(--coral));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.mclose{background:none;border:none;color:var(--muted);font-size:1.8rem;cursor:pointer;line-height:1;padding:0 4px;transition:color .2s;}
.mclose:hover{color:var(--text);}

/* ═══ FORMS ═══ */
.fg{display:flex;flex-direction:column;gap:6px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.full{grid-column:1/-1;}
label.lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;}
input,select,textarea{
  background:rgba(255,255,255,0.06);
  border:1px solid var(--brd);
  border-radius:12px;padding:12px 14px;
  color:var(--text);font-size:14px;outline:none;
  transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;appearance:none;
  width:100%;
}
input:focus,select:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(14,165,233,0.15);}
select option{background:var(--night2);}
.chip-row{display:flex;gap:8px;flex-wrap:wrap;}
.chip{
  padding:8px 16px;border-radius:50px;
  border:1px solid var(--brd);background:transparent;
  color:var(--muted);font-size:13px;cursor:pointer;
  font-weight:500;transition:all .2s;
}
.chip.on{background:linear-gradient(135deg,var(--sky),var(--ocean));color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(14,165,233,.3);}
.chip.on-coral{background:linear-gradient(135deg,var(--coral),#E11D48);color:#fff;border-color:transparent;}
.tabs{display:flex;gap:8px;margin-bottom:1.5rem;}
.btn-go{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--coral),#E11D48);
  color:#fff;border:none;border-radius:50px;
  font-size:15px;font-weight:700;
  margin-top:.75rem;
  box-shadow:var(--shadow-coral);transition:all .3s;
}
.btn-go:hover{transform:translateY(-2px);box-shadow:0 14px 44px rgba(249,115,22,.5);}
.btn-go:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-sky-go{background:linear-gradient(135deg,var(--sky),var(--ocean));box-shadow:var(--shadow-sky);}
.btn-sky-go:hover{box-shadow:0 14px 44px rgba(14,165,233,.5);}
.email-alt{
  background:rgba(14,165,233,0.08);border:1px solid rgba(14,165,233,0.22);
  border-radius:12px;padding:.9rem 1.1rem;margin-top:.5rem;font-size:13px;color:#7DD3FC;
}
.email-alt strong{display:block;margin-bottom:3px;color:var(--sky);}
.divider{height:1px;background:var(--brd);margin:1.25rem 0;grid-column:1/-1;}

/* ═══ PROFIL ═══ */
.avatar-ring{
  width:88px;height:88px;border-radius:50%;
  background:linear-gradient(135deg,var(--sun),var(--coral));
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:#fff;
  margin:0 auto 1rem;box-shadow:var(--shadow-coral);
}
.uname{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:900;text-align:center;}
.uname em{font-style:normal;background:linear-gradient(135deg,var(--sun),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.usub{color:var(--muted);font-size:14px;text-align:center;margin-top:4px;}
.sc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.65rem;margin:1.25rem 0;}
.sc{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:.9rem .5rem;text-align:center;}
.sc-n{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;}
.s1{background:linear-gradient(135deg,var(--sun),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.s2{background:linear-gradient(135deg,var(--sky),var(--mint));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.s3{background:linear-gradient(135deg,var(--mint),var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.s4{background:linear-gradient(135deg,var(--coral),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sc-l{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;}
.count-box{
  background:linear-gradient(135deg,rgba(251,191,36,.10),rgba(249,115,22,.10));
  border:1px solid rgba(251,191,36,.32);border-radius:18px;
  padding:1.25rem;text-align:center;margin:.75rem 0;
}
.count-n{
  font-family:'Playfair Display',serif;font-size:3.5rem;font-weight:900;line-height:1;
  background:linear-gradient(135deg,var(--sun),var(--coral));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.count-l{font-size:13px;color:var(--muted);margin-top:4px;}
.count-sub{font-size:13px;color:var(--sun);margin-top:8px;font-weight:600;}
.prog-wrap{height:7px;background:rgba(255,255,255,.07);border-radius:20px;overflow:hidden;margin-top:10px;}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--sun),var(--coral));border-radius:20px;transition:width 1s ease;}
.trip-list{display:flex;flex-direction:column;gap:.5rem;margin-top:.75rem;}
.tc{
  background:var(--card);border:1px solid var(--brd);
  border-radius:13px;padding:.9rem 1.1rem;
  display:flex;align-items:center;gap:.9rem;transition:border-color .2s;
}
.tc:hover{border-color:rgba(14,165,233,.32);}
.tc-route{font-weight:700;font-size:14px;}
.tc-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.tc-stars{color:var(--sun);font-size:12px;}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:50px;text-transform:uppercase;letter-spacing:.7px;white-space:nowrap;}
.b-perso{background:rgba(251,191,36,.15);color:var(--sun);}
.b-pro{background:rgba(14,165,233,.15);color:var(--sky);}
.prop{background:var(--card);border:1px solid var(--brd);border-radius:15px;padding:1.1rem 1.3rem;margin-bottom:.65rem;position:relative;transition:all .2s;}
.prop:hover{border-color:rgba(14,165,233,.35);}
.prop.best{border-color:var(--sun);box-shadow:0 8px 28px rgba(251,191,36,.12);}
.best-badge{position:absolute;top:-11px;left:1rem;background:linear-gradient(135deg,var(--sun),var(--coral));color:#fff;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;padding:3px 12px;border-radius:50px;}
.prop-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;}
.prop-dest{font-family:'Playfair Display',serif;font-weight:700;font-size:1.05rem;}
.prop-price{font-size:1.15rem;font-weight:800;white-space:nowrap;background:linear-gradient(135deg,var(--sun),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.prop-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.prop-desc{font-size:13px;color:var(--muted);margin-top:7px;line-height:1.6;}
.prop-acts{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;}
.bsm{padding:7px 16px;border-radius:50px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
.bsm.pp{background:linear-gradient(135deg,var(--sky),var(--ocean));color:#fff;}
.bsm.ps{background:transparent;border:1px solid var(--brd);color:var(--muted);}
.bsm:hover{transform:translateY(-1px);}
.share-strip{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.22);
  border-radius:13px;padding:.9rem 1.1rem;margin-top:.9rem;
}
.share-strip p{font-size:12px;color:var(--muted);}
.shbtn{padding:6px 14px;border-radius:50px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--brd);background:transparent;color:var(--text);transition:all .2s;}
.shbtn:hover{background:var(--card2);}
.star-btn{background:none;border:none;font-size:1.8rem;cursor:pointer;color:var(--sun);transition:transform .15s;padding:0 2px;}
.star-btn:hover{transform:scale(1.3);}

/* ═══════════════════════════════
   TOAST
═══════════════════════════════ */
#toast{
  position:fixed;bottom:5rem;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:linear-gradient(135deg,var(--mint),var(--sky));
  color:#fff;padding:11px 24px;border-radius:50px;
  font-size:14px;font-weight:600;z-index:9999;
  opacity:0;transition:all .35s;pointer-events:none;
  box-shadow:0 8px 28px rgba(16,185,129,.35);
  white-space:nowrap;max-width:90vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ═══════════════════════════════
   ANIMATIONS
═══════════════════════════════ */
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
@keyframes zoomIn{from{opacity:0;transform:scale(.5);}to{opacity:1;transform:scale(1);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(8px);}}
@keyframes spinPlane{
  0%{transform:rotate(0deg);}
  25%{transform:rotate(15deg);}
  75%{transform:rotate(-10deg);}
  100%{transform:rotate(360deg);}
}
@keyframes dotP{0%,80%,100%{transform:scale(.4);opacity:.2;}40%{transform:scale(1);opacity:1;}}
@keyframes borderPulse{0%,100%{border-color:rgba(249,115,22,0.5);box-shadow:0 0 0 0 rgba(249,115,22,0);}50%{border-color:rgba(249,115,22,0.9);box-shadow:0 0 0 6px rgba(249,115,22,0.1);}}
@keyframes borderPulseBlue{0%,100%{border-color:rgba(14,165,233,0.4);box-shadow:0 0 0 0 rgba(14,165,233,0);}50%{border-color:rgba(14,165,233,0.8);box-shadow:0 0 0 6px rgba(14,165,233,0.1);}}
.dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--coral);margin:0 2px;animation:dotP 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}

/* ═══════════════════════════════
   RESPONSIVE
═══════════════════════════════ */
@media(max-width:768px){
  header{padding:.75rem 1rem;}
  .logo{font-size:1.4rem;}
  nav{display:none;}
  .hdr-right{gap:6px;}
  #lang-sel{padding:5px 8px;font-size:12px;}
  .btn-hdr{padding:8px 14px;font-size:13px;}
  .btn-hdr-sub{display:none;}
  .hero-cta{flex-direction:column;align-items:center;}
  .cta-card{min-width:280px;}
  .fgrid{grid-template-columns:1fr;}
  .full{grid-column:1;}
  .sc-grid{grid-template-columns:repeat(2,1fr);}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:1rem;}
  .modal{padding:1.5rem;}
  .hero-pills{display:none;}
  #pwa-banner{margin:0 1rem 1.5rem;}

}

  .modal{border-radius:16px;}
  .cta-card{min-width:260px;padding:12px 20px;}
}
</style>

/* ══════════════════════════════════════════
   GLOBE 3D — Three.js chargé dynamiquement
   pour éviter tout timeout Edge
══════════════════════════════════════════ */
var globeInited=false;
function initGlobe(){
  if(globeInited)return;
  globeInited=true;
  var canvas=document.getElementById('globe-canvas');
  var W=canvas.offsetWidth||window.innerWidth;
  var H=canvas.offsetHeight||window.innerHeight;

  /* Test WebGL — fallback gracieux si absent */
  var hasGL=false;
  try{
    var t=document.createElement('canvas');
    hasGL=!!(t.getContext('webgl')||t.getContext('experimental-webgl'));
  }catch(e){}
  if(!hasGL||typeof THREE==='undefined'){
    /* Fallback 2D Canvas simple */
    var c=canvas.getContext('2d');
    if(!c)return;
    canvas.width=W;canvas.height=H;
    var grd=c.createRadialGradient(W/2-W*0.15,H/2-H*0.15,0,W/2,H/2,Math.min(W,H)*0.45);
    grd.addColorStop(0,'#1E6FBF');grd.addColorStop(0.6,'#082F49');grd.addColorStop(1,'#040C1A');
    c.beginPath();c.arc(W/2,H/2,Math.min(W,H)*0.45,0,Math.PI*2);c.fillStyle=grd;c.fill();
    return;
  }

  var scene=new THREE.Scene();
  var cam=new THREE.PerspectiveCamera(45,W/H,0.1,200);
  cam.position.z=3.0;

  var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:true,powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
  renderer.setSize(W,H);
  renderer.setClearColor(0x000000,0);

  /* TERRE */
  var earth=new THREE.Mesh(
    new THREE.SphereGeometry(1,64,64),
    new THREE.MeshPhongMaterial({color:0x0369A1,emissive:0x051A35,specular:0x38BDF8,shininess:80})
  );
  scene.add(earth);

  /* Continents (blobs verts) */
  var cM=new THREE.MeshPhongMaterial({color:0x15803D,emissive:0x052E16,shininess:20});
  var conts=[
    [50,15,0.14],[55,25,0.10],[46,9,0.11],
    [5,22,0.26],[20,15,0.20],[-10,26,0.18],[0,36,0.13],
    [36,80,0.28],[55,85,0.22],[20,98,0.18],[40,118,0.16],[30,46,0.14],
    [45,-100,0.24],[30,-88,0.18],[55,-100,0.16],
    [0,-58,0.20],[-15,-55,0.18],[-35,-65,0.16],
    [-25,134,0.17],[-40,174,0.09],
    [65,26,0.12],[65,68,0.18],[65,108,0.16]
  ];
  conts.forEach(function(c){
    var phi=(90-c[0])*Math.PI/180,theta=(c[1]+180)*Math.PI/180,sz=c[2];
    var x=-Math.sin(phi)*Math.cos(theta),y=Math.cos(phi),z=Math.sin(phi)*Math.sin(theta);
    var b=new THREE.Mesh(new THREE.SphereGeometry(sz,10,10),cM);
    b.position.set(x*(1+sz*0.08),y*(1+sz*0.08),z*(1+sz*0.08));
    earth.add(b);
  });

  /* Grille lat/lng */
  var gM=new THREE.LineBasicMaterial({color:0x7DD3FC,transparent:true,opacity:0.13});
  [-60,-30,0,30,60].forEach(function(lat){
    var pts=[],y=Math.sin(lat*Math.PI/180),r=Math.cos(lat*Math.PI/180)*1.004;
    for(var i=0;i<=64;i++){var a=i/64*Math.PI*2;pts.push(new THREE.Vector3(Math.cos(a)*r,y*1.004,Math.sin(a)*r));}
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),gM));
  });
  for(var lng=0;lng<360;lng+=30){
    var pts=[];
    for(var j=0;j<=48;j++){var la=(j/48*180-90)*Math.PI/180,a2=lng*Math.PI/180;pts.push(new THREE.Vector3(-Math.cos(la)*Math.cos(a2)*1.004,Math.sin(la)*1.004,Math.cos(la)*Math.sin(a2)*1.004));}
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),gM));
  }

  /* Atmosphère */
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.06,32,32),new THREE.MeshPhongMaterial({color:0x38BDF8,transparent:true,opacity:0.06})));

  /* Étoiles */
  var sg=new THREE.BufferGeometry(),sp=[];
  for(var i=0;i<1800;i++){var rr=55+Math.random()*80,tt=Math.random()*Math.PI*2,pp=Math.acos(2*Math.random()-1);sp.push(-rr*Math.sin(pp)*Math.cos(tt),rr*Math.cos(pp),rr*Math.sin(pp)*Math.sin(tt));}
  sg.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.10,transparent:true,opacity:0.65})));

  /* Trajectoires de vol */
  var fM=new THREE.LineBasicMaterial({color:0xFBBF24,transparent:true,opacity:0.55});
  function ll(la,lo,r){r=r||1.016;var phi=(90-la)*Math.PI/180,theta=(lo+180)*Math.PI/180;return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));}
  [[48.8,2.3,35.6,139.7],[40.7,-74,51.5,-0.1],[-33.9,18.4,48.8,2.3],[1.3,103.8,34,-118],[25.2,55.4,40.7,-74],[-33.8,151,13.7,100.5]].forEach(function(r){
    var p1=ll(r[0],r[1]),p2=ll(r[2],r[3]),mid=new THREE.Vector3().addVectors(p1,p2).multiplyScalar(1.58);
    var pts=new THREE.QuadraticBezierCurve3(p1,mid,p2).getPoints(80);
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),fM));
  });

  /* ── AVION AMÉLIORÉ ── */
  var plGrp=new THREE.Group();
  var wM=new THREE.MeshPhongMaterial({color:0xF8FAFC,emissive:0x555555,shininess:180,specular:0xFFFFFF});
  var oM=new THREE.MeshPhongMaterial({color:0xF97316,emissive:0xC05010,shininess:100});
  var bM=new THREE.MeshPhongMaterial({color:0x1E40AF,emissive:0x0A1A50,shininess:200,transparent:true,opacity:0.9});

  /* Fuselage */
  var fuse=new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.013,0.14,12),wM);
  fuse.rotation.z=Math.PI/2;plGrp.add(fuse);
  /* Nez (cône) */
  var nose=new THREE.Mesh(new THREE.ConeGeometry(0.013,0.05,10),wM);
  nose.rotation.z=-Math.PI/2;nose.position.x=0.095;plGrp.add(nose);
  /* Ailes principales (forme tronquée) */
  var wShape=new THREE.Shape();
  wShape.moveTo(0.01,0);wShape.lineTo(0.055,0.075);wShape.lineTo(0.055,0.082);wShape.lineTo(-0.015,0.03);wShape.lineTo(-0.015,0);wShape.closePath();
  var wGeo=new THREE.ExtrudeGeometry(wShape,{depth:0.005,bevelEnabled:false});
  var wingR=new THREE.Mesh(wGeo,wM);wingR.position.set(0.01,-0.002,0);wingR.rotation.x=-Math.PI/2;plGrp.add(wingR);
  var wingL=wingR.clone();wingL.scale.z=-1;wingL.position.z=0.005;plGrp.add(wingL);
  /* Dérive verticale (orange Trip&Me) */
  var dShape=new THREE.Shape();
  dShape.moveTo(0,0);dShape.lineTo(-0.045,0.048);dShape.lineTo(-0.045,0.054);dShape.lineTo(-0.005,0.007);dShape.lineTo(-0.005,0);dShape.closePath();
  var dGeo=new THREE.ExtrudeGeometry(dShape,{depth:0.004,bevelEnabled:false});
  var deriv=new THREE.Mesh(dGeo,oM);deriv.position.set(-0.025,-0.002,-0.002);deriv.rotation.z=Math.PI/2;deriv.rotation.y=Math.PI/2;plGrp.add(deriv);
  /* Empennage horizontal */
  var sShape=new THREE.Shape();
  sShape.moveTo(0,0);sShape.lineTo(-0.028,0.034);sShape.lineTo(-0.028,0.040);sShape.lineTo(0.005,0.009);sShape.lineTo(0.005,0);sShape.closePath();
  var sGeo=new THREE.ExtrudeGeometry(sShape,{depth:0.004,bevelEnabled:false});
  var stabR=new THREE.Mesh(sGeo,wM);stabR.position.set(-0.038,-0.002,0);stabR.rotation.x=-Math.PI/2;plGrp.add(stabR);
  var stabL=stabR.clone();stabL.scale.z=-1;stabL.position.z=0.004;plGrp.add(stabL);
  /* Moteurs (réacteurs) */
  var eGeo=new THREE.CylinderGeometry(0.012,0.014,0.05,12);
  var eM2=new THREE.MeshPhongMaterial({color:0x334155,shininess:150,specular:0x888888});
  [[0.025,-0.013],[0.025,0.013]].forEach(function(pos){
    var eng=new THREE.Mesh(eGeo,eM2);eng.rotation.z=Math.PI/2;eng.position.set(0,pos[0]-0.015,pos[1]);plGrp.add(eng);
    /* Nacelle avant */
    var naGeo=new THREE.ConeGeometry(0.012,0.02,10);
    var na=new THREE.Mesh(naGeo,eM2);na.rotation.z=-Math.PI/2;na.position.set(0.038,pos[0]-0.015,pos[1]);plGrp.add(na);
  });
  /* Hublots (bleus) */
  var portGeo=new THREE.CircleGeometry(0.005,8);
  [-0.01,0.025,0.055].forEach(function(px){
    var port=new THREE.Mesh(portGeo,bM);port.position.set(px,0.025,0.001);plGrp.add(port);
  });

  plGrp.scale.setScalar(0.95);
  scene.add(plGrp);

  /* Traînée lumineuse */
  var trailMat=new THREE.LineBasicMaterial({color:0xFBBF24,transparent:true,opacity:0.45});
  var trailPts=[];for(var ti=0;ti<30;ti++)trailPts.push(new THREE.Vector3(0,0,0));
  var trailGeo=new THREE.BufferGeometry().setFromPoints(trailPts);
  var trail=new THREE.Line(trailGeo,trailMat);scene.add(trail);
  var history=[];

  /* Lumières */
  scene.add(new THREE.AmbientLight(0x4488AA,0.7));
  var sun=new THREE.DirectionalLight(0xFFF4E6,1.7);sun.position.set(5,3,5);scene.add(sun);
  scene.add(Object.assign(new THREE.PointLight(0x0EA5E9,0.45,15),{position:{x:-4,y:-2,z:-4}}));
  scene.add(Object.assign(new THREE.PointLight(0xF97316,0.25,10),{position:{x:0,y:5,z:-5}}));

  /* Interaction souris */
  var mx=0,my=0,tx=0,ty=0;
  document.addEventListener('mousemove',function(e){mx=(e.clientX/window.innerWidth-0.5);my=(e.clientY/window.innerHeight-0.5);});

  /* Resize */
  window.addEventListener('resize',function(){
    var nw=canvas.offsetWidth||window.innerWidth,nh=canvas.offsetHeight||window.innerHeight;
    renderer.setSize(nw,nh);cam.aspect=nw/nh;cam.updateProjectionMatrix();
  });

  /* Orbite avion — ellipse inclinée */
  var plA=0,oA=1.58,oB=1.22,oC=0.38;

  function animate(){
    requestAnimationFrame(animate);
    earth.rotation.y+=0.0022;
    tx+=(mx*0.10-tx)*0.04;ty+=(my*0.08-ty)*0.04;
    earth.rotation.x=ty;

    /* Position avion */
    plA+=0.018;
    var px=Math.cos(plA)*oA,pz=Math.sin(plA)*oB,py=Math.sin(plA*0.8+0.6)*oC;
    plGrp.position.set(px,py,pz);

    /* Orientation tangentielle */
    var dpx=-Math.sin(plA)*oA,dpz=Math.cos(plA)*oB,dpy=Math.cos(plA*0.8+0.6)*oC*0.8;
    var nLen=Math.sqrt(dpx*dpx+dpy*dpy+dpz*dpz);
    plGrp.lookAt(px+dpx/nLen*0.2,py+dpy/nLen*0.2,pz+dpz/nLen*0.2);

    /* Traînée */
    history.unshift(new THREE.Vector3(px,py,pz));
    if(history.length>30)history.pop();
    var pos=trailGeo.attributes.position;
    if(pos){for(var k=0;k<30;k++){var p=history[k]||history[history.length-1]||new THREE.Vector3(px,py,pz);pos.setXYZ(k,p.x,p.y,p.z);}pos.needsUpdate=true;}

    renderer.render(scene,cam);
  }
  animate();
}

/* Chargement Three.js asynchrone — compatible Edge, Chrome, Firefox, Safari */
function loadThree(){
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
  s.crossOrigin='anonymous';
  s.onload=function(){setTimeout(initGlobe,100);};
  s.onerror=function(){initGlobe();/* fallback 2D */};
  document.head.appendChild(s);
}

  else{if(btn)btn.textContent=tr('hdr_guest');if(sub)sub.textContent=tr('hdr_sub');}
}
function handleHeaderBtn(){if(getUser())openProfile();else openOv('ov-auth');}

/* ══════════════════════════════════════════
   AUTH
══════════════════════════════════════════ */
function requireAuth(action){U=getUser();if(U){doAction(action);}else{afterAuth=action;openOv('ov-auth');}}
function doAction(a){if(a==='add-trip'){setStar(0);openOv('ov-add');}else if(a==='plan')openOv('ov-plan');else if(a==='profile')openProfile();}
function authTab(tab){
  sel('pane-li').style.display=tab==='li'?'block':'none';
  sel('pane-rg').style.display=tab==='rg'?'block':'none';
  sel('tab-li').className='chip'+(tab==='li'?' on':'');
  sel('tab-rg').className='chip'+(tab==='rg'?' on':'');
}
function b64(s){try{return btoa(unescape(encodeURIComponent(s)));}catch(e){return btoa(s);}}
function doLogin(){
  var email=sel('li-email').value.trim(),pwd=sel('li-pwd').value;
  if(!email||!pwd){toast('Email + mot de passe requis.');return;}
  var u=getUser();
  if(u&&u.email===email&&u.pwd===b64(pwd)){
    U=u;closeOv('ov-auth');applyLang();
    toast(tr('welcome_back',{n:u.first}));
    if(afterAuth){doAction(afterAuth);afterAuth=null;}else openProfile();
  }else toast('❌ Email ou mot de passe incorrect.');
}
function doRegister(){
  var fn=sel('rg-fn').value.trim(),ln=sel('rg-ln').value.trim();
  var em=sel('rg-em').value.trim(),pw=sel('rg-pw').value;
  var rgpd=sel('rg-rgpd').checked;
  if(!fn||!ln||!em){toast('Prénom, nom et email obligatoires.');return;}
  if(!rgpd){toast('Veuillez accepter la politique de confidentialité.');return;}
  if(pw.length<8){toast('Mot de passe : 8 caractères minimum.');return;}
  var u={first:fn,last:ln,email:em,pwd:b64(pw),dob:sel('rg-dob').value,country:sel('rg-co').value,trips:[],created:new Date().toISOString()};
  saveUser(u);U=u;closeOv('ov-auth');applyLang();
  toast('🎉 '+tr('welcome_back',{n:fn}));
  if(afterAuth){doAction(afterAuth);afterAuth=null;}else openProfile();
}
function logout(){U=null;closeOv('ov-profile');applyLang();toast('👋 À bientôt !');}

/* ══════════════════════════════════════════
   PROFIL
══════════════════════════════════════════ */
function openProfile(){U=getUser();if(!U){openOv('ov-auth');return;}renderProfile();openOv('ov-profile');}
function cntries(trips){var s=new Set();(trips||[]).forEach(function(t){if(t.arr)s.add(t.arr.split(/[\s,\(]/)[0]);});return s.size;}
function totKm(trips){return (trips||[]).reduce(function(a,t){return a+(parseInt(t.count)||1)*4500*(t.type&&t.type.indexOf('/')>-1?2:1);},0);}
function wTours(trips){return Math.floor(totKm(trips)/40075);}
function persoC(trips){return (trips||[]).filter(function(t){return t.cat==='Perso';}).length;}
function renderProfile(){
  if(!U)return;
  var trips=U.trips||[],pc=persoC(trips),toN=Math.max(0,10-pc);
  var km=totKm(trips),ct=cntries(trips),tours=wTours(trips);
  var ini=(U.first[0]+(U.last[0]||'')).toUpperCase();
  var sl=tr('stat_lbl')||['','','',''];
  var cdBox='';
  if(pc<10){
    cdBox='<div class="count-box"><div class="count-n">'+toN+'</div><div class="count-l">'+tr('count_l')+'</div><div class="count-sub">'+tr('count_sub')+'</div><div class="prog-wrap"><div class="prog-bar" style="width:'+Math.round(pc/10*100)+'%"></div></div><div style="font-size:11px;color:var(--muted);margin-top:6px;">'+pc+' / 10</div></div>';
  }else{
    cdBox='<div class="count-box" style="background:linear-gradient(135deg,rgba(16,185,129,.10),rgba(16,185,129,.04));border-color:rgba(16,185,129,.32);"><div style="font-size:2rem;">🎉</div><div style="font-family:Playfair Display,serif;font-weight:700;font-size:1.1rem;color:#34D399;margin-top:6px;">'+tr('cg_title')+' '+U.first+' !</div><div style="font-size:13px;color:var(--muted);margin-top:6px;">'+tr('cg_sub')+'</div><button class="btn-go btn-sky-go" style="max-width:280px;margin:1rem auto 0;" onclick="closeOv(\'ov-profile\');openOv(\'ov-plan\')">'+tr('offer_btn')+'</button></div>';
  }
  var tripsHTML='';
  if(!trips.length){
    tripsHTML='<p style="color:var(--muted);text-align:center;padding:1.5rem 0;font-size:14px;">'+tr('btn_add')+'</p>';
  }else{
    trips.slice().reverse().slice(0,25).forEach(function(t){
      var stars='★'.repeat(t.stars||0)+'☆'.repeat(5-(t.stars||0));
      tripsHTML+='<div class="tc"><div style="flex:1"><div class="tc-route">'+t.dep+' → '+t.arr+'</div><div class="tc-meta">'+t.type+' · '+t.formula+(parseInt(t.count)>1?' · ×'+t.count:'')+(t.date?' · '+t.date:'')+'</div><div class="tc-stars">'+stars+'</div></div><span class="badge '+(t.cat==='Pro'?'b-pro':'b-perso')+'">'+t.cat+'</span></div>';
    });
  }
  sel('profile-body').innerHTML=
    '<div class="avatar-ring">'+ini+'</div>'+
    '<div class="uname">'+tr('hdr_user',{n:U.first})+'</div>'+
    '<div class="usub">'+U.email+'</div>'+
    '<div class="sc-grid">'+
      '<div class="sc"><div class="sc-n s1">'+ct+'</div><div class="sc-l">'+sl[0]+'</div></div>'+
      '<div class="sc"><div class="sc-n s2">'+Math.max(0,195-ct)+'</div><div class="sc-l">'+sl[1]+'</div></div>'+
      '<div class="sc"><div class="sc-n s3">'+Math.round(km/1000)+'k</div><div class="sc-l">'+sl[2]+'</div></div>'+
      '<div class="sc"><div class="sc-n s4">'+(tours>0?tours:'<1')+'</div><div class="sc-l">'+sl[3]+'</div></div>'+
    '</div>'+cdBox+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin:1.25rem 0 .65rem;">'+
      '<div style="font-family:Playfair Display,serif;font-weight:700;">'+tr('my_trips')+' ('+trips.length+')</div>'+
      '<div style="display:flex;gap:8px;">'+
        '<button class="bsm pp" onclick="closeOv(\'ov-profile\');setStar(0);openOv(\'ov-add\')">'+tr('btn_add')+'</button>'+
        '<button class="bsm pp" style="background:linear-gradient(135deg,var(--coral),#E11D48);" onclick="closeOv(\'ov-profile\');openOv(\'ov-plan\')">'+tr('btn_plan_s')+'</button>'+
      '</div></div>'+
    '<div class="trip-list">'+tripsHTML+'</div>'+
    '<div class="share-strip" style="margin-top:1.25rem;"><p>'+tr('share_stats')+'</p>'+
      '<button class="shbtn" onclick="shareStats(\'wa\')">📱 WhatsApp</button>'+
      '<button class="shbtn" onclick="shareStats(\'copy\')">📸 Instagram / TikTok</button>'+
    '</div>'+
    '<div style="text-align:right;margin-top:1.25rem;"><button onclick="logout()" style="background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;">'+tr('logout')+'</button></div>';
}

/* ══════════════════════════════════════════
   ÉTOILES
══════════════════════════════════════════ */
function setStar(n){
  starVal=n;
  document.querySelectorAll('.star-btn').forEach(function(b,i){b.textContent=i<n?'★':'☆';b.style.transform=i<n?'scale(1.2)':'scale(1)';});
  var lbl=sel('star-lbl');
  if(lbl){var s=tr('stars')||[];lbl.textContent=s[n]||'';}
}

/* ══════════════════════════════════════════
   AJOUT VOYAGE
══════════════════════════════════════════ */
function toggleShareOpt(){
  var cat=sel('a-cat');
  var wrap=sel('share-opt');
  if(wrap)wrap.style.display=(cat&&cat.value==='Perso')?'block':'none';
}
function saveTrip(){
  var dep=sel('a-dep').value.trim(),arr=sel('a-arr').value.trim();
  if(!dep||!arr){toast('Aéroports requis !');return;}
  U=getUser();if(!U)return;
  var trip={dep:dep,arr:arr,type:sel('a-type').value,cat:sel('a-cat').value,formula:sel('a-formula').value,count:sel('a-count').value,date:sel('a-date').value,stars:starVal,id:Date.now()};
  U.trips=U.trips||[];U.trips.push(trip);saveUser(U);
  handleShare(trip);
  ['a-dep','a-arr','a-date'].forEach(function(id){var e=sel(id);if(e)e.value='';});
  sel('a-count').value='1';setStar(0);
  closeOv('ov-add');toast(tr('trip_saved'));
  if(persoC(U.trips)===10)setTimeout(function(){toast('🎉 '+tr('cg_title')+'! '+tr('cg_sub'));},1500);
  openProfile();
}
function handleShare(trip){
  var insta=sel('sh-insta')&&sel('sh-insta').classList.contains('on');
  var tiktok=sel('sh-tiktok')&&sel('sh-tiktok').classList.contains('on');
  var wa=sel('sh-wa')&&sel('sh-wa').classList.contains('on');
  var hdl=sel('a-handle')&&sel('a-handle').value||'';
  if(!insta&&!tiktok&&!wa)return;
  var stars='★'.repeat(trip.stars||5);
  var htxt=hdl?' ('+hdl+')':'';
  var txt='✈ '+U.first+htxt+' a ajouté un voyage sur Trip&Me !\n'+trip.dep+' → '+trip.arr+'\n'+stars+'\n\n🌍 tripandme.com\n#TripAndMe #WorldIsMe #Voyage #Travel\n@tripandme_worldismine @TripandMe_WorldisMine';
  if(wa)window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
  if(insta||tiktok){try{navigator.clipboard.writeText(txt);}catch(e){}toast(tr('share_copied'));}
}
function shareStats(plat){
  U=getUser();if(!U)return;
  var km=totKm(U.trips||[]),ct=cntries(U.trips||[]),tours=wTours(U.trips||[]);
  var txt='🌍 '+U.first+' a visité '+ct+' pays, parcouru '+Math.round(km/1000)+'k km et fait '+tours+' tour(s) du monde avec Trip&Me !\n✈ tripandme.com\n#TripAndMe #WorldIsMe #Voyage #Travel\n@tripandme_worldismine @TripandMe_WorldisMine';
  if(plat==='wa')window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
  else{try{navigator.clipboard.writeText(txt);}catch(e){}toast(tr('share_copied'));}
}

/* ══════════════════════════════════════════
   PLANIFICATEUR
══════════════════════════════════════════ */
function selVtype(btn,idx){vtypeIdx=idx;document.querySelectorAll('#vtype-chips .chip').forEach(function(b){b.className='chip';});btn.className='chip on-coral';}
function launchSearch(){
  var btn=sel('btn-srch'),res=sel('plan-results');
  var dest=sel('p-dest').value||'';
  var budget=sel('p-budget').value;
  var durEl=sel('p-dur');var durTxt=durEl?durEl.options[durEl.selectedIndex].text:'';
  btn.disabled=true;
  btn.innerHTML='<span style="display:flex;align-items:center;justify-content:center;gap:8px;"><span class="dots"><span></span><span></span><span></span></span></span>';
  res.innerHTML='';
  setTimeout(function(){
    res.innerHTML=renderProps(genProps(dest,budget,durTxt));
    btn.disabled=false;btn.textContent=tr('btn_srch');
    res.scrollIntoView({behavior:'smooth',block:'start'});
  },1800);
}
function genProps(dest,budget,dur){
  var b=parseInt(budget)||2000;
  var fb=tr('prop_fb')||[];
  return [
    {best:true,dest:dest||(fb[0]||'Bali'),sub:(tr('prop_sub')||[''])[0],price:Math.round(b*0.88),hotel:(tr('prop_hotels')||[''])[0],body:(tr('prop_body')||[''])[0],dur:dur},
    {best:false,dest:dest?(dest+' — Premium'):(fb[1]||'Maldives'),sub:(tr('prop_sub')||['',''])[1],price:Math.round(b*1.22),hotel:(tr('prop_hotels')||['',''])[1],body:(tr('prop_body')||['',''])[1],dur:dur},
    {best:false,dest:dest?(dest+' — Éco'):(fb[2]||'Lisbonne'),sub:(tr('prop_sub')||['','',''])[2],price:Math.round(b*0.63),hotel:(tr('prop_hotels')||['','',''])[2],body:(tr('prop_body')||['','',''])[2],dur:dur},
    {best:false,dest:fb[3]||'Mystère',sub:(tr('prop_sub')||['','','',''])[3],price:Math.round(b*0.94),hotel:(tr('prop_hotels')||['','','',''])[3],body:(tr('prop_body')||['','','',''])[3],dur:dur}
  ];
}
function renderProps(props){
  var h='<div style="font-family:\'Playfair Display\',serif;font-weight:700;font-size:1.05rem;margin:1.25rem 0 .75rem;">'+tr('prop_title')+'</div>';
  props.forEach(function(p){
    h+='<div class="prop'+(p.best?' best':'')+'">'+(p.best?'<div class="best-badge">'+tr('prop_best')+'</div>':'')+
      '<div class="prop-hdr"><div><div class="prop-dest">'+p.dest+'</div><div class="prop-meta">'+p.sub+(p.dur?' · '+p.dur:'')+'</div></div>'+
      '<div class="prop-price">'+p.price+'€<span style="font-size:12px;color:var(--muted)">/pers.</span></div></div>'+
      '<div class="prop-desc">'+p.hotel+' — '+p.body+'</div>'+
      '<div class="prop-acts">'+
        '<button class="bsm pp" onclick="alert(\''+tr('book')+'...\')">'+tr('book')+'</button>'+
        '<button class="bsm ps" onclick="alert(\'📅\')">'+tr('cal')+'</button>'+
        '<button class="bsm ps" onclick="shareProp(\''+p.dest+'\','+p.price+')">'+tr('share')+'</button>'+
      '</div></div>';
  });
  h+='<div class="share-strip"><p>'+tr('share_lbl')+'</p>'+
    '<button class="shbtn" onclick="shareProposals(\'wa\')">📱 WhatsApp</button>'+
    '<button class="shbtn" onclick="shareProposals(\'copy\')">📸 Instagram / TikTok</button></div>'+
    '<p style="font-size:11px;color:var(--muted);margin-top:8px;text-align:center;">'+tr('rgpd_note')+'</p>';
  return h;
}
function shareProp(dest,price){
  var nm=U?U.first+' — ':'';
  var txt='✈ '+nm+dest+' — '+price+'€/pers.\n🌍 tripandme.com\n#TripAndMe #WorldIsMe\n@tripandme_worldismine @TripandMe_WorldisMine';
  try{navigator.clipboard.writeText(txt);}catch(e){}toast(tr('share_copied'));
}
function shareProposals(plat){
  var nm=U?U.first+' ':'';
  var txt='✈ '+nm+'vient de planifier son prochain voyage sur Trip&Me !\n🌍 tripandme.com\n#TripAndMe #WorldIsMe\n@tripandme_worldismine @TripandMe_WorldisMine';
  if(plat==='wa')window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
  else{try{navigator.clipboard.writeText(txt);}catch(e){}toast(tr('share_copied'));}
}

/* ══════════════════════════════════════════
   PWA — Progressive Web App
══════════════════════════════════════════ */
var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();deferredPrompt=e;
  var banner=sel('pwa-banner');
  if(banner&&!localStorage.getItem('pwa-dismissed'))banner.style.display='flex';
});
function installPWA(){
  if(!deferredPrompt){
    /* Instructions manuelles */
    alert('Pour installer Trip&Me :\n\n📱 iPhone/iPad : Appuyez sur "Partager" (⬆) puis "Sur l\'écran d\'accueil"\n\n🤖 Android : Menu (⋮) puis "Ajouter à l\'écran d\'accueil"\n\n✅ Trip&Me fonctionnera comme une application !');
    return;
  }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(r){
    if(r.outcome==='accepted'){localStorage.setItem('pwa-dismissed','1');sel('pwa-banner').style.display='none';}
    deferredPrompt=null;
  });
}
window.addEventListener('appinstalled',function(){
  sel('pwa-banner').style.display='none';
  localStorage.setItem('pwa-dismissed','1');
  toast('✅ Trip&Me installé !');
});

/* ══════════════════════════════════════════
   RGPD & COOKIES
══════════════════════════════════════════ */
function acceptCookies(){localStorage.setItem('tm_consent','ok');sel('cookie-banner').classList.add('hidden');}
function refuseCookies(){localStorage.setItem('tm_consent','no');sel('cookie-banner').classList.add('hidden');}
function showPrivacy(){alert(tr('privacy_txt'));}

/* ══════════════════════════════════════════
   MODALS
══════════════════════════════════════════ */
function openOv(id){var e=sel(id);if(e)e.classList.add('open');}
function closeOv(id){var e=sel(id);if(e)e.classList.remove('open');}
function bgClose(e,id){if(e.target&&e.target.id===id)closeOv(id);}
function scrollToId(id){var e=sel(id);if(e)e.scrollIntoView({behavior:'smooth'});}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
var toastT;
function toast(msg){
  var e=sel('toast');if(!e)return;
  e.textContent=msg;e.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(function(){e.classList.remove('show');},3200);
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
function init(){
  detectLang();
  U=getUser();
  applyLang();
  /* Cookie banner — 1 seule fois */
  if(!localStorage.getItem('tm_consent')){
    sel('cookie-banner').classList.remove('hidden');
  }else{
    sel('cookie-banner').classList.add('hidden');
  }
  /* Globe — chargement asynchrone pour ne jamais bloquer Edge */
  loadThree();
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
}else{
  init();
}
