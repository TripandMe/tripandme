<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip&Me</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0C1A2E,#1E3A8A);
color:white;
text-align:center;
}

.container{max-width:500px;margin:auto;padding:20px;}

input,textarea{
width:90%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
width:95%;
padding:15px;
margin-top:10px;
border-radius:50px;
border:none;
font-weight:bold;
background:linear-gradient(135deg,#F97316,#E11D48);
color:white;
cursor:pointer;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:20px;
margin-top:20px;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="container">

<h1>🌍 Trip&Me</h1>
<p>World is Mine ✈️</p>

<!-- STATS -->
<div class="card">
<p>🔥 1200+ Web</p>
<p>📱 2500 TikTok</p>
<p>📸 1500 Instagram</p>
</div>

<!-- AUTH -->
<div id="auth">

<div class="card">
<h3>👤 Mon compte</h3>
<input id="email" placeholder="Ton email">
<button onclick="login()">Se connecter ou créer</button>
</div>

</div>

<!-- APP -->
<div id="app" class="hidden">

<!-- TRIPS -->
<div class="card">
<h3>📍 Mes voyages passés</h3>

<input id="tripInput" placeholder="Ex: Bali 2023">
<button onclick="addTrip()">Ajouter</button>

<div id="tripList"></div>
</div>

<!-- SEARCH -->
<div class="card">
<h3>✈️ Planifier mon voyage</h3>

<input id="dest" placeholder="Destination">
<textarea id="keywords" placeholder="Plage, luxe..."></textarea>

<button onclick="generateTrips()">Trouver</button>
</div>

<!-- RESULTS -->
<div id="results"></div>

</div>

</div>

<script>

let user = null;

// LOGIN SIMPLE
function login(){
const email=document.getElementById("email").value;

if(!email.includes("@")) return alert("Email invalide");

user=email;

document.getElementById("auth").style.display="none";
document.getElementById("app").classList.remove("hidden");

loadTrips();
}

// TRIPS LOCAL
function addTrip(){
const val=document.getElementById("tripInput").value;

let trips=JSON.parse(localStorage.getItem("trips")||"[]");
trips.push(val);

localStorage.setItem("trips",JSON.stringify(trips));

loadTrips();
}

function loadTrips(){
let trips=JSON.parse(localStorage.getItem("trips")||"[]");

document.getElementById("tripList").innerHTML=
trips.map(t=>`<p>✈️ ${t}</p>`).join("");
}

// GENERATE TRIPS
function generateTrips(){

const dest=document.getElementById("dest").value || "Bali";

let html="";

for(let i=1;i<=4;i++){

let price=Math.floor(Math.random()*400+300);
let airline=["Air France","Emirates","Qatar Airways","Lufthansa"][Math.floor(Math.random()*4)];
let hotel=["Hotel 4★ Beach","Luxury Resort","City Hotel","Boutique Hotel"][Math.floor(Math.random()*4)];

html+=`
<div class="card">
<h3>🔥 Offre ${i} - ${dest}</h3>

<p>✈️ ${price}€</p>
<p>📅 7 jours</p>
<p>🛫 ${airline}</p>
<p>🏨 ${hotel}</p>
<p>📍 Activités incluses</p>

<button onclick="book('${dest}')">Réserver</button>

</div>`;
}

document.getElementById("results").innerHTML=html;
}

// BOOKING
function book(dest){
window.open(`https://www.booking.com/searchresults.html?ss=${dest}&aid=7933909`);
}

</script>

</body>
</html>
